spring.application.name=geo_quest

# Database configuration for Neon PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Database initialization
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Server
server.port=8080

# Logging
logging.level.com.applabs=DEBUG

# Firebase Configuration
# TODO: Set FIREBASE_CREDENTIALS environment variable with your Firebase service account JSON
# Get this from: Firebase Console → Project Settings → Service accounts → Generate new private key
# The value should be the entire JSON content of the service account key file